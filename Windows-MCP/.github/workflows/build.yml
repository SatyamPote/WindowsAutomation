name: Build Lotus

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build Windows binaries
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Read version.json
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content version.json | ConvertFrom-Json).version
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Lotus version: $v"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Syntax check (compileall)
        shell: pwsh
        run: |
          python -m compileall -q src
          python -m compileall -q lotus_tray.py bot_service.py app.py

      - name: Smoke-import critical modules
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -c "import windows_mcp.updater; import windows_mcp.telegram_bot; print('imports OK')"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Lotus.exe + LotusTray.exe
        shell: cmd
        run: call build.bat
        env:
          PYTHONIOENCODING: utf-8

      - name: Verify PyInstaller outputs
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Lotus.exe"))     { throw "Lotus.exe missing" }
          if (-not (Test-Path "dist/LotusTray.exe")) { throw "LotusTray.exe missing" }
          Get-Item dist/*.exe | Select-Object Name, Length

      - name: Build LotusSetup.exe (Inno Setup)
        shell: pwsh
        run: ./scripts/build_installer.ps1

      - name: Verify installer output
        shell: pwsh
        run: |
          if (-not (Test-Path "installer_output/LotusSetup.exe")) {
            throw "LotusSetup.exe missing"
          }
          Get-Item installer_output/LotusSetup.exe | Select-Object Name, Length

      - name: Generate build changelog
        shell: pwsh
        run: python scripts/generate_changelog.py --output changelog.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lotus-${{ steps.ver.outputs.version }}-${{ github.sha }}
          retention-days: 14
          path: |
            dist/Lotus.exe
            dist/LotusTray.exe
            installer_output/LotusSetup.exe
            changelog.txt
            version.json

      - name: Comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const ver = "${{ steps.ver.outputs.version }}";
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "✅ **Lotus build completed successfully**",
              "",
              `**Version:** v${ver}`,
              "",
              "**Artifacts:**",
              "- Lotus.exe",
              "- LotusTray.exe",
              "- LotusSetup.exe",
              "",
              `[Download from this run](${run})`,
            ].join("\n");
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
