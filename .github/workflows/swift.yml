name: Build & Release Lotus.app

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Mac-MCP/**'
      - '.github/workflows/swift.yml'
  pull_request:
    paths:
      - 'Mac-MCP/**'
      - '.github/workflows/swift.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Lotus.app + DMG
    runs-on: macos-14
    defaults:
      run:
        working-directory: Mac-MCP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Sync Python dependencies
        run: uv sync

      - name: Resolve release version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Stamp version into build scripts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          /usr/bin/sed -i '' "s/^VERSION=\"1.0.0\"/VERSION=\"$VERSION\"/" \
            ControlPanel/make_app.sh ControlPanel/make_dmg.sh

      - name: Build Lotus.app
        run: bash ControlPanel/make_app.sh

      - name: Build DMG
        run: bash ControlPanel/make_dmg.sh

      - name: Verify artifacts
        run: |
          ls -lh Lotus.app
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lotus-${{ steps.version.outputs.version }}-dmg
          path: Mac-MCP/dist/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          pattern: Lotus-*-dmg
          merge-multiple: true
          path: artifacts

      - name: Compute checksum
        run: |
          cd artifacts
          shasum -a 256 *.dmg | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lotus ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/SHA256SUMS.txt
