name: Build and Release Lotus

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r Windows-MCP/requirements.txt

    - name: Build Executable
      working-directory: Windows-MCP
      run: |
        .\build.bat
      shell: cmd

    - name: Compile Installer
      uses: aybe/innosetup-action@v1.2.2
      with:
        filepath: Windows-MCP/installer.iss

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LotusSetup
        path: Windows-MCP/installer_output/LotusSetup.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: Windows-MCP/installer_output/LotusSetup.exe
        body_path: Windows-MCP/RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
